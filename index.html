<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Just For You ❤️</title><style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
    overflow: hidden;
}

.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

h1 {
    font-size: 2.8em;
}

p {
    font-size: 1.2em;
    margin-bottom: 30px;
}

button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 30px;
    font-size: 1em;
    cursor: pointer;
    transition: 0.3s;
}

#yesBtn {
    background: #ff4e78;
    color: white;
}

#noBtn {
    background: white;
    color: #333;
    position: absolute;
}

#result {
    margin-top: 20px;
    font-size: 1.5em;
    display: none;
}
</style></head><body><div class="container">
    <h1>Wait… One Question 💭</h1>
    <p>Do you like me? 😳</p><button id="yesBtn" onclick="yesClicked()">Yes ❤️</button>
<button id="noBtn" onmouseover="moveNo()">No 🙈</button>

<div id="result">I knew it 😏❤️</div>

</div><script>

function yesClicked() {
    document.getElementById("result").style.display = "block";
}

/* Move No Button */
function moveNo() {
    let btn = document.getElementById("noBtn");
    let x = Math.random() * window.innerWidth - 100;
    let y = Math.random() * window.innerHeight - 50;
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

</script></body>
</html>
